<section>
<h2>Send us a message</h2>
  <!-- Contact Form -->
  <form action="mailto:lutongcp@gmail.com" method="post" enctype="text/plain">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Your Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="message">Message:</label>
    <textarea id="message" name="message" rows="5" required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <!-- Contact Info -->
  <div class="contact-info">
    <h2>Other ways to reach us</h2>
    <p>Email: <a href="mailto:lutongcp@gmail.com">lutongcp@gmail.com</a></p>
    <p>Instagram: <a href="https://instagram.com/lutongcp" target="_blank">@lutongcp</a></p>
  </div>
